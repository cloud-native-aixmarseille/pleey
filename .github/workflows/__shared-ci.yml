name: Shared - Continuous Integration

on:
  workflow_call:

permissions: {}

jobs:
  linter:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@4c9d51717dc04d823dac2dc9ac2857e7b3069454 # v0.35.0
    permissions:
      actions: read
      contents: read
      security-events: write
      statuses: write
    with:
      codeql-languages: "" # FIXME: Let default value when CodeQL will be available (paid feature)
      linter-env: |
        VALIDATE_TSX=false
        VALIDATE_GRAPHQL_PRETTIER=false
        VALIDATE_JSON_PRETTIER=false
        VALIDATE_JSX_PRETTIER=false
        VALIDATE_JAVASCRIPT_PRETTIER=false
        VALIDATE_TYPESCRIPT_PRETTIER=false
        VALIDATE_TYPESCRIPT_ES=false

  build:
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@2b647ed6f11d50cb6beb6d56333e68ba2c804826 # v0.33.1
    permissions:
      contents: read
      packages: write
      issues: read
      pull-requests: read
      id-token: write
    with:
      oci-registry: ${{ vars.OCI_REGISTRY }}
      oci-registry-username: ${{ github.repository_owner }}
      sign: false
      images: |
        [
          {
            "name": "backend-ci",
            "context": ".",
            "dockerfile": "./application/backend/Dockerfile",
            "build-args": { "APP_PATH": "./application/backend/" },
            "target": "ci",
            "platforms": ["linux/amd64"]
          },
          {
            "name": "frontend-ci",
            "context": ".",
            "dockerfile": "./application/frontend/Dockerfile",
            "build-args": { "APP_PATH": "./application/frontend/" },
            "target": "ci",
            "platforms": ["linux/amd64"]
          }
        ]
    secrets:
      oci-registry-password: ${{ secrets.GITHUB_TOKEN }}

  continuous-integration:
    strategy:
      matrix:
        service: ["backend", "frontend"]
    uses: hoverkraft-tech/ci-github-nodejs/.github/workflows/continuous-integration.yml@a10d5e32daef8e060c49fe617833fb0d53476f22 # v0.24.0
    needs: build
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      security-events: write
      packages: read
    with:
      working-directory: /usr/src/app
      container: |
        {
          "image": ${{ toJSON(fromJSON(needs.build.outputs.built-images)[format('{0}-ci', matrix.service)].images[0]) }},
          "credentials": {
            "username": ${{ toJson(github.repository_owner) }}
          },
          "pathMapping": {
            "/usr/src/app": ${{ toJson(format('./application/{0}', matrix.service)) }}
          }
        }
      code-ql: "" # FIXME: Set `typescript` when CodeQL will be available (paid feature)
      dependency-review: false # FIXME: Set `true` when Dependency Review will be available (paid feature)
    secrets:
      container-password: ${{ secrets.GITHUB_TOKEN }}

  build-prod:
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@2b647ed6f11d50cb6beb6d56333e68ba2c804826 # v0.33.1
    needs: continuous-integration
    permissions:
      contents: read
      packages: write
      issues: read
      pull-requests: read
      id-token: write
    with:
      oci-registry: ${{ vars.OCI_REGISTRY }}
      oci-registry-username: ${{ github.repository_owner }}
      sign: false
      images: |
        [
          {
            "name": "backend",
            "context": ".",
            "dockerfile": "./application/backend/Dockerfile",
            "build-args": { "APP_PATH": "./application/backend/" },
            "target": "prod",
            "platforms": ["linux/amd64"]
          },
          {
            "name": "frontend",
            "context": ".",
            "dockerfile": "./application/frontend/Dockerfile",
            "build-args": { "APP_PATH": "./application/frontend/" },
            "target": "prod",
            "platforms": ["linux/amd64"]
          }
        ]
    secrets:
      oci-registry-password: ${{ secrets.GITHUB_TOKEN }}

  tests-charts:
    runs-on: ubuntu-latest
    needs: build-prod
    permissions:
      contents: read
      packages: read
    steps:
      - name: Test helm chart (umbrella)
        uses: hoverkraft-tech/ci-github-container/actions/helm/test-chart@2b647ed6f11d50cb6beb6d56333e68ba2c804826 # v0.33.1
        with:
          helm-repositories: |
            bitnami https://charts.bitnami.com/bitnami
          helm-set: |
            backend.image.registry=${{ fromJSON(needs.build-prod.outputs.built-images).backend.registry }}
            backend.image.repository=${{ fromJSON(needs.build-prod.outputs.built-images).backend.repository }}
            backend.image.tag=${{ fromJSON(needs.build-prod.outputs.built-images).backend.tags[0] }}
            backend.image.digest=${{ fromJSON(needs.build-prod.outputs.built-images).backend.digest }}
            frontend.image.registry=${{ fromJSON(needs.build-prod.outputs.built-images).frontend.registry }}
            frontend.image.repository=${{ fromJSON(needs.build-prod.outputs.built-images).frontend.repository }}
            frontend.image.tag=${{ fromJSON(needs.build-prod.outputs.built-images).frontend.tags[0] }}
            frontend.image.digest=${{ fromJSON(needs.build-prod.outputs.built-images).frontend.digest }}
          oci-registry: ${{ vars.OCI_REGISTRY }}
          oci-registry-username: ${{ github.repository_owner }}
          oci-registry-password: ${{ github.token }}
