name: Build and Test Docker Images

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_jwt_secret_for_ci' }}

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm run test

      - name: Upload backend coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 30

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm test

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 30

  e2e-tests:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/votre_secret_jwt_super_securise_changez_moi/${{ env.JWT_SECRET }}/g' .env

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c 'until curl -f http://localhost:3001/api/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -f http://localhost:5173; do sleep 2; done'

      - name: Run backend health check
        run: |
          response=$(curl -s http://localhost:3001/api/health)
          echo "Backend health: $response"
          if [[ $response != *"ok"* ]]; then
            echo "Backend health check failed"
            exit 1
          fi

      - name: Run frontend health check
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173)
          echo "Frontend status: $status"
          if [[ $status != "200" ]]; then
            echo "Frontend health check failed"
            exit 1
          fi

      - name: Inject seeds data
        run: |
          docker compose exec -T backend npx prisma migrate deploy
          docker compose exec -T backend npx prisma db seed

      - name: Install e2e test dependencies
        run: |
          cd e2e
          npm ci

      - name: Install Playwright browsers
        run: |
          cd e2e
          npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          cd e2e
          npm run test:smoke
        continue-on-error: true

      - name: Run all e2e tests
        run: |
          cd e2e
          npm test

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test artifacts
        uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7

      - name: Display logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs backend
          echo "=== Frontend logs ==="
          docker compose logs frontend

      - name: Stop services
        if: always()
        run: docker compose down

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "sarif"
          output: "trivy-backend-results.sarif"

      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "sarif"
          output: "trivy-frontend-results.sarif"

      - name: Run Trivy vulnerability scanner - Backend (Table format)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./backend"
          format: "table"

      - name: Run Trivy vulnerability scanner - Frontend (Table format)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./frontend"
          format: "table"

      - name: Upload Trivy results as artifacts
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: trivy-security-results
          path: |
            trivy-backend-results.sarif
            trivy-frontend-results.sarif
          retention-days: 30

  publish:
    permissions:
      contents: read
      issues: read
      packages: write
      pull-requests: read
      id-token: write
    needs: [e2e-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@4f29319e02dd65152386c436e8c3136f380a0e71 # 0.28.0
    secrets:
      oci-registry-password: ${{ secrets.GITHUB_TOKEN }}
    with:
      sign: true
      images: |
        [
          {
            "name": "backend",
            "context": "./backend",
            "dockerfile": "Dockerfile",
            "platforms": ["linux/amd64", "linux/arm64"]
          },
          {
            "name": "frontend",
            "context": "./frontend",
            "dockerfile": "Dockerfile",
            "platforms": ["linux/amd64", "linux/arm64"]
          }
        ]
