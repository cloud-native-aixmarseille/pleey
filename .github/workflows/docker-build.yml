name: Build and Test Docker Images

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Create .env file
      run: |
        cp .env.example .env
        sed -i 's/votre_secret_jwt_super_securise_changez_moi/${{ secrets.JWT_SECRET }}/g' .env

    - name: Build Docker images
      run: docker-compose build

    - name: Start services
      run: docker-compose up -d

    - name: Wait for services to be ready
      run: |
        echo "Waiting for backend..."
        timeout 60 bash -c 'until curl -f http://localhost:3001/api/health; do sleep 2; done'
        echo "Waiting for frontend..."
        timeout 60 bash -c 'until curl -f http://localhost; do sleep 2; done'

    - name: Run backend health check
      run: |
        response=$(curl -s http://localhost:3001/api/health)
        echo "Backend health: $response"
        if [[ $response != *"ok"* ]]; then
          echo "Backend health check failed"
          exit 1
        fi

    - name: Run frontend health check
      run: |
        status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost)
        echo "Frontend status: $status"
        if [[ $status != "200" ]]; then
          echo "Frontend health check failed"
          exit 1
        fi

    - name: Display logs on failure
      if: failure()
      run: |
        echo "=== Backend logs ==="
        docker-compose logs backend
        echo "=== Frontend logs ==="
        docker-compose logs frontend

    - name: Stop services
      if: always()
      run: docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Run Trivy vulnerability scanner - Backend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './backend'
        format: 'sarif'
        output: 'trivy-backend-results.sarif'

    - name: Run Trivy vulnerability scanner - Frontend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './frontend'
        format: 'sarif'
        output: 'trivy-frontend-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: '.'

  publish:
    needs: [build-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/quizmaster-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/quizmaster-backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quizmaster-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quizmaster-backend:buildcache,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/quizmaster-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/quizmaster-frontend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quizmaster-frontend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quizmaster-frontend:buildcache,mode=max