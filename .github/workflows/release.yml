name: "• 🚀 Release"

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions: {}

jobs:
  plan-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      tag: ${{ steps.plan-release.outputs.tag }}
      name: ${{ steps.plan-release.outputs.name }}
    steps:
      - id: plan-release
        uses: hoverkraft-tech/ci-github-publish/actions/release/plan@607069025f6c1312680ed0864c4d9f4338b82dfe # 0.26.5
        with:
          github-token: ${{ github.token }}

  ci:
    needs: [plan-release]
    uses: ./.github/workflows/__shared-ci.yml
    with:
      production-image-tag: ${{ needs.plan-release.outputs.tag }}
    permissions:
      actions: read
      checks: write
      contents: read
      id-token: write
      issues: read
      packages: write
      pull-requests: write
      security-events: write
      statuses: write
    secrets: inherit

  prepare-release-files:
    needs: [plan-release, ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release-sha: ${{ steps.generate-docs.outputs.merged-sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Update chart image defaults
        uses: hoverkraft-tech/ci-github-container/actions/helm/update-chart-values@c9088e8447c5a8be45157e17701023fc50ccb1c0 # 0.37.2
        with:
          path: charts/application
          values: >-
            [
              {
                "file":"charts/backend/values.yaml",
                "path":".image.tag",
                "value":"${{ fromJSON(needs.ci.outputs.built-prod-images).backend.tags[0] }}"
              },
              {
                "file":"charts/backend/values.yaml",
                "path":".image.digest",
                "value":"${{ fromJSON(needs.ci.outputs.built-prod-images).backend.digest }}"
              },
              {
                "file":"charts/frontend/values.yaml",
                "path":".image.tag",
                "value":"${{ fromJSON(needs.ci.outputs.built-prod-images).frontend.tags[0] }}"
              },
              {
                "file":"charts/frontend/values.yaml",
                "path":".image.digest",
                "value":"${{ fromJSON(needs.ci.outputs.built-prod-images).frontend.digest }}"
              },
              {
                "file":"Chart.yaml",
                "path":".version",
                "value":"${{ needs.plan-release.outputs.tag }}"},
              {
                "file":"Chart.yaml",
                "path":".appVersion",
                "value":"${{ needs.plan-release.outputs.tag }}"},
              {
                "file":"Chart.yaml",
                "path":"(.dependencies[] | select(.repository == \"file://charts/frontend\").version)",
                "value":"${{ needs.plan-release.outputs.tag }}"
              },
              {
                "file":"Chart.yaml",
                "path":"(.dependencies[] | select(.repository == \"file://charts/backend\").version)",
                "value":"${{ needs.plan-release.outputs.tag }}"
              },
              {
                "file":"charts/backend/Chart.yaml",
                "path":".version",
                "value":"${{ needs.plan-release.outputs.tag }}"
                },
              {
                "file":"charts/backend/Chart.yaml",
                "path":".appVersion",
                "value":"${{ needs.plan-release.outputs.tag }}"
              },
              {
                "file":"charts/frontend/Chart.yaml",
                "path":".version",
                "value":"${{ needs.plan-release.outputs.tag }}"
              },
              {
                "file":"charts/frontend/Chart.yaml",
                "path":".appVersion",
                "value":"${{ needs.plan-release.outputs.tag }}"
              }
            ]

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Refresh umbrella Chart.lock
        shell: bash
        run: helm dependency update charts/application

      - name: Regenerate Helm chart documentation
        id: generate-docs
        uses: hoverkraft-tech/ci-github-container/actions/helm/generate-docs@c9088e8447c5a8be45157e17701023fc50ccb1c0 # 0.37.2
        with:
          working-directory: ./charts
          checkout-ref: ""
          github-app-client-id: ${{ vars.CI_BOT_APP_CLIENT_ID }}
          github-app-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}

  draft-release:
    needs: [plan-release, prepare-release-files]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      tag: ${{ steps.create-release.outputs.tag }}
    steps:
      - id: create-release
        uses: hoverkraft-tech/ci-github-publish/actions/release/create@607069025f6c1312680ed0864c4d9f4338b82dfe # 0.26.5
        with:
          tag: ${{ needs.plan-release.outputs.tag }}
          target-sha: ${{ needs.prepare-release-files.outputs.release-sha }}
          publish: "false"
          github-token: ${{ github.token }}

  publish-release-artifacts:
    needs: [plan-release, ci, prepare-release-files, draft-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - id: release-chart
        uses: hoverkraft-tech/ci-github-container/actions/helm/release-chart@c9088e8447c5a8be45157e17701023fc50ccb1c0 # 0.37.2
        with:
          oci-registry: ${{ vars.OCI_REGISTRY }}
          oci-registry-username: ${{ github.repository_owner }}
          oci-registry-password: ${{ github.token }}
          chart: application
          path: charts/application
          helm-repositories: |
            cloudnative-pg https://cloudnative-pg.github.io/charts
            valkey https://valkey.io/valkey-helm/
          tag: ${{ needs.plan-release.outputs.tag }}
          ref: ${{ needs.prepare-release-files.outputs.release-sha }}

  publish-release:
    needs: [draft-release, publish-release-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: hoverkraft-tech/ci-github-publish/actions/release/update@607069025f6c1312680ed0864c4d9f4338b82dfe # 0.26.5
        with:
          tag: ${{ needs.draft-release.outputs.tag }}
          publish: "true"
          github-token: ${{ github.token }}
