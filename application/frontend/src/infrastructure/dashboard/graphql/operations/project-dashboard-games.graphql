query ProjectDashboardGames($input: ProjectDashboardGamesInput!) {
  projectDashboardGames(input: $input) {
    items {
      id
      gameId
      type
      title
      description
      createdAt
      relatedGameId
      stageCount
    }
    totalCount
    overallCount
    page
    pageSize
    totalPages
  }
}
