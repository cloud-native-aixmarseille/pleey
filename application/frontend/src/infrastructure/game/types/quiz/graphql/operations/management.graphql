query QuizManagement($quizId: ID!) {
  quiz(quizId: $quizId) {
    quizId
    gameId
    title
    description
    allowOptionChangeAfterVoting
    randomizeStageOrder
    randomizeOptionOrder
    createdAt
    questionCount
  }
  quizQuestions(quizId: $quizId) {
    id
    quizId
    position
    questionText
    type
    timeLimit
    points
    answers {
      id
      text
      position
      isCorrect
    }
  }
}

mutation UpdateQuizManagement($quizId: ID!, $input: UpdateQuizInput!) {
  updateQuiz(quizId: $quizId, input: $input) {
    quizId
    allowOptionChangeAfterVoting
    randomizeStageOrder
    randomizeOptionOrder
  }
}

mutation CreateQuizManagement($input: CreateQuizInput!) {
  createQuiz(input: $input) {
    quizId
  }
}

mutation CreateQuizFromImportManagement($input: CreateQuizFromImportInput!) {
  createQuizFromImport(input: $input) {
    quizId
    questionCount
  }
}

mutation DeleteQuizManagement($quizId: ID!) {
  deleteQuiz(quizId: $quizId)
}

mutation CreateQuizQuestionManagement($input: CreateQuizQuestionInput!) {
  createQuizQuestion(input: $input) {
    id
    quizId
    position
    questionText
    type
    timeLimit
    points
    answers {
      id
      text
      position
      isCorrect
    }
  }
}

mutation UpdateQuizQuestionManagement($questionId: ID!, $input: UpdateQuizQuestionInput!) {
  updateQuizQuestion(questionId: $questionId, input: $input) {
    id
    quizId
    position
    questionText
    type
    timeLimit
    points
    answers {
      id
      text
      position
      isCorrect
    }
  }
}

mutation DeleteQuizQuestionManagement($questionId: ID!) {
  deleteQuizQuestion(questionId: $questionId)
}
