query WorkspaceProjectsByOrganization($input: ListOrganizationProjectsInput!) {
  organizationProjects(input: $input) {
    items {
      id
      name
      description
      organizationId
      createdAt
    }
    totalCount
    overallCount
    page
    pageSize
    totalPages
  }
}

mutation CreateProject($organizationId: ID!, $input: CreateProjectInput!) {
  createProject(organizationId: $organizationId, input: $input) {
    id
    name
    description
    organizationId
    createdAt
  }
}

mutation UpdateProject($projectId: ID!, $input: UpdateProjectInput!) {
  updateProject(projectId: $projectId, input: $input) {
    id
    name
    description
    organizationId
    createdAt
  }
}

mutation DeleteProject($projectId: ID!, $migrationProjectId: ID) {
  deleteProject(projectId: $projectId, migrationProjectId: $migrationProjectId)
}
