global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'quizmaster-monitor'

# Alerting (optionnel)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Configuration des jobs de scraping
scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend Node.js
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:3001']
    metrics_path: '/metrics'

  # Node Exporter - Métriques système
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor - Métriques Docker
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Frontend Nginx (si configuré avec nginx-prometheus-exporter)
  - job_name: 'nginx'
    static_configs:
      - targets: ['frontend:9113']