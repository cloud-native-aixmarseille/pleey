apiVersion: v2
name: pleey-app
description: Production-ready umbrella chart for the Pleey frontend, backend, PostgreSQL, and Valkey runtime.
type: application
version: 0.1.0
appVersion: "main"
home: https://github.com/cloud-native-aixmarseille/pleey
sources:
  - https://github.com/cloud-native-aixmarseille/pleey
keywords:
  - pleey
  - realtime
  - games
  - react
  - nestjs
  - cloudnativepg
maintainers:
  - name: Pleey Maintainers
    url: https://github.com/cloud-native-aixmarseille/pleey
icon: https://raw.githubusercontent.com/cloud-native-aixmarseille/pleey/main/application/frontend/public/favicon/favicon.svg
dependencies:
  - name: frontend
    version: 0.1.0
    repository: file://charts/frontend
    condition: frontend.enabled
    import-values:
      - child: service
        parent: _frontend.service
  - name: backend
    version: 0.1.0
    repository: file://charts/backend
    condition: backend.enabled
    import-values:
      - child: service
        parent: _backend.service
      - child: database
        parent: _backend.database
      - child: valkey
        parent: _backend.valkey
      - child: cloudnativepgOperator
        parent: _backend.cloudnativepgOperator
