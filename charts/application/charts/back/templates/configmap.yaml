apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "default.fullname" . }}
  namespace: {{ include "default.namespace" . | quote }}
  labels:
    {{- include "default.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: {{ .Values.service.containerPort | quote }}
  CORS_ORIGIN: {{ .Values.config.corsOrigin | quote }}
