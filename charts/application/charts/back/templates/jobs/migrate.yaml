apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "default.fullname" . }}-db-migrate
  namespace: {{ include "default.namespace" . | quote }}
  annotations:
    {{- include "default.annotations" . | nindent 4 }}
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    {{- include "default.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "default.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        app.kubernetes.io/component: db-migrate
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      serviceAccountName: {{ include "default.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      initContainers:
        - name: wait-for-db
          image: {{ include "default.waitForDbImage" . | quote }}
          imagePullPolicy: {{ .Values.waitForDb.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            limits:
              cpu: {{ .Values.waitForDb.resources.limits.cpu | quote }}
              memory: {{ .Values.waitForDb.resources.limits.memory | quote }}
            requests:
              cpu: {{ .Values.waitForDb.resources.requests.cpu | quote }}
              memory: {{ .Values.waitForDb.resources.requests.memory | quote }}
          command:
            - sh
            - -c
            - |
                echo "database host : {{ include "default.databaseHost" . }}"
                until nc -z {{ include "default.databaseHost" . }} 5432; do
                  echo "Waiting for PostgreSQL..."
                  sleep 2
                done
                echo "PostgreSQL is ready!"
      containers:
        - name: db-migrate
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "default.image" . | quote }}
          imagePullPolicy: {{ include "default.imagePullPolicy" . }}
          envFrom:
            - configMapRef:
                name: {{ include "default.fullname" . }}
          command:
            - sh
            - -c
            - |
                export DATABASE_URL="$(cat /etc/pleey/secrets/DATABASE_URL)"
                export JWT_SECRET="$(cat /etc/pleey/secrets/JWT_SECRET)"
                /usr/src/app/node_modules/.bin/prisma migrate deploy
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
          volumeMounts:
            - name: app-secrets
              mountPath: /etc/pleey/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-secrets
          secret:
            secretName: {{ include "default.fullname" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
