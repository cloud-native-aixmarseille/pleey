apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pleey.backend.appSecretName" . }}
  labels:
    {{- include "pleey.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  PLEEY_MANAGED_SECRET: "true"
  {{- if not .Values.auth.existingSecret.name }}
  JWT_SECRET: {{ include "pleey.backend.jwtSecret" . | quote }}
  {{- end }}
  {{- if and (eq .Values.database.provider "external") (not .Values.database.external.existingSecret.name) }}
  DATABASE_URL: {{ include "pleey.backend.databaseUrl" . | quote }}
  {{- end }}
  {{- if or (eq .Values.valkey.provider "builtin") (and (eq .Values.valkey.provider "external") (not .Values.valkey.external.existingSecret.name)) }}
  VALKEY_URL: {{ include "pleey.backend.valkeyUrl" . | quote }}
  {{- end }}
