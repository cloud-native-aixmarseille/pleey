{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "default.fullname" . }}
  namespace: {{ include "default.namespace" . | quote }}
  labels:
    {{- include "default.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "default.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.ingressNamespaceSelector }}
        - namespaceSelector:
            {{- toYaml . | nindent 12 }}
        {{- end }}
  egress:
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - to:
        - podSelector: {}
    {{- end }}
    {{- if .Values.networkPolicy.allowDnsEgress }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
{{- end }}