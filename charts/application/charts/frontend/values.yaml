---
global:
  applicationName: pleey-app
  fullnameOverride: ""
  imageRegistry: ""
  imagePullPolicy: Always
  imagePullSecrets: []
imagePullSecrets: []
replicaCount: 1
image:
  registry: ""
  repository: ghcr.io/cloud-native-aixmarseille/pleey/frontend
  tag: 0.2.0
  digest: sha256:6664714ab17ebe1ff497c91c93cd8ad09e3c8c995ed2442df22d70d8d53d6891
  pullPolicy: ""
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}
config:
  apiUrl: ""
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi
startupProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  failureThreshold: 12
  periodSeconds: 5
livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
podAnnotations: {}
podLabels: {}
priorityClassName: ""
terminationGracePeriodSeconds: 30
topologySpreadConstraints: []
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
