{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pleey.fullname" . }}-backend
  namespace: {{ include "pleey.namespace" . | quote }}
  labels:
    {{- include "pleey.backend.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.backend.env.nodeEnv | quote }}
  PORT: {{ .Values.backend.env.port | quote }}
  CORS_ORIGIN: {{ .Values.backend.env.corsOrigin | quote }}
  VALKEY_URL: {{ include "pleey.valkeyUrl" . | quote }}
  SESSION_STATE_TTL_SECONDS: {{ .Values.backend.env.sessionStateTtlSeconds | quote }}
{{- end }}
