{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pleey.fullname" . }}-backend
  namespace: {{ include "pleey.namespace" . | quote }}
  labels:
    {{- include "pleey.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.backend.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "pleey.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/backend/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/backend/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "pleey.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- $imagePullSecrets := coalesce .Values.imagePullSecrets .Values.global.imagePullSecrets }}
      {{- with $imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "pleey.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-db
          image: {{ include "pleey.waitForDb.image" . }}
          imagePullPolicy: {{ include "pleey.imagePullPolicy" . }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ .Release.Name }}-postgresql 5432; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
        - name: db-migrate
          image: {{ include "pleey.backend.image" . }}
          imagePullPolicy: {{ include "pleey.imagePullPolicy" . }}
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          env:
            - name: HOME
              value: /tmp
            - name: npm_config_cache
              value: /tmp/.npm
          command:
            - sh
            - -c
            - |
              export DATABASE_URL="$(cat /run/secrets/database-url)"
              /usr/src/app/node_modules/.bin/prisma migrate deploy
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: backend-secrets
              mountPath: /run/secrets
              readOnly: true
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.backend.securityContext | nindent 12 }}
          image: {{ include "pleey.backend.image" . }}
          imagePullPolicy: {{ include "pleey.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.backend.env.nodeEnv | quote }}
            - name: PORT
              value: {{ .Values.backend.env.port | quote }}
            - name: OPENAPI_JSON_PATH
              value: /tmp/openapi.json
            - name: CORS_ORIGIN
              value: {{ .Values.backend.env.corsOrigin | quote }}
            - name: VALKEY_URL
              value: {{ include "pleey.valkeyUrl" . | quote }}
            - name: SESSION_STATE_TTL_SECONDS
              value: {{ .Values.backend.env.sessionStateTtlSeconds | quote }}
            - name: JWT_SECRET_FILE
              value: /run/secrets/jwt-secret
            - name: DATABASE_URL_FILE
              value: /run/secrets/database-url
            {{- if .Values.otelCollector.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.backend.env.otelExporterOtlpEndpoint | quote }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.backend.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.backend.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: backend-secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: backend-secrets
          secret:
            secretName: {{ include "pleey.fullname" . }}-backend
            defaultMode: 0444
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
