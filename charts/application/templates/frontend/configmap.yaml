{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pleey.fullname" . }}-frontend
  namespace: {{ include "pleey.namespace" . | quote }}
  labels:
    {{- include "pleey.frontend.labels" . | nindent 4 }}
data:
  VITE_API_URL: {{ .Values.frontend.env.apiUrl | quote }}
{{- end }}
