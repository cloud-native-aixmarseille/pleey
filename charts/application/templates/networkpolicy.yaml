{{- if .Values.backend.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "quiz-app.fullname" . }}-backend
  namespace: {{ include "quiz-app.namespace" . | quote }}
  labels:
    {{- include "quiz-app.backend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "quiz-app.backend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
{{- end }}
{{- if .Values.frontend.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "quiz-app.fullname" . }}-frontend
  namespace: {{ include "quiz-app.namespace" . | quote }}
  labels:
    {{- include "quiz-app.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "quiz-app.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
