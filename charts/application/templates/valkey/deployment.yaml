{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pleey.valkey.fullname" . }}
  namespace: {{ include "pleey.namespace" . | quote }}
  labels:
    {{- include "pleey.valkey.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "pleey.valkey.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pleey.valkey.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.valkey.podSecurityContext | nindent 8 }}
      containers:
        - name: valkey
          image: {{ printf "%s:%s" .Values.valkey.image.repository .Values.valkey.image.tag | quote }}
          imagePullPolicy: {{ .Values.valkey.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            {{- toYaml .Values.valkey.securityContext | nindent 12 }}
          args:
            - "--save"
            - ""
            - "--appendonly"
            - "no"
          ports:
            - name: redis
              containerPort: {{ .Values.valkey.service.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
