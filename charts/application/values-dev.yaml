---
# Development environment values for Pleey
# Usage: helm install pleey ./deploy/helm/pleey \
#   -f ./deploy/helm/pleey/values-dev.yaml

backend:
  replicaCount: 1

  image:
    tag: "dev"
    pullPolicy: Always

  env:
    nodeEnv: development
    corsOrigin: "*"

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

  autoscaling:
    enabled: false

frontend:
  replicaCount: 1

  image:
    tag: "dev"
    pullPolicy: Always

  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

  autoscaling:
    enabled: false

postgresql:
  enabled: true

  auth:
    username: pleeyapp
    password: pleeyapp_dev_password
    database: pleeydb

  primary:
    persistence:
      enabled: true
      size: 2Gi

    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

ingress:
  enabled: true
  className: "nginx"

  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"

  hosts:
    - host: pleey-dev.local
      paths:
        - path: /api
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /socket.io
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /
          pathType: Prefix
          service:
            name: frontend
            port: 80

  tls: []

otelCollector:
  enabled: false

monitoring:
  enabled: false
