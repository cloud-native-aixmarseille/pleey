---
# Production environment values for QuizMaster
# Usage: helm install quiz-app ./deploy/helm/quiz-app \
#   -f ./deploy/helm/quiz-app/values-prod.yaml

backend:
  replicaCount: 3

  image:
    registry: ghcr.io
    repository: cloud-native-aixmarseille/quiz-app/backend
    tag: "v1.0.0"
    pullPolicy: IfNotPresent

  env:
    nodeEnv: production
    corsOrigin: "https://quiz.example.com"

  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 500m
      memory: 256Mi

  secrets:
    # Use external secrets operator or sealed secrets for production
    # DO NOT commit actual secrets to git
    jwtSecret: "CHANGE_ME"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

frontend:
  replicaCount: 3

  image:
    registry: ghcr.io
    repository: cloud-native-aixmarseille/quiz-app/frontend
    tag: "v1.0.0"
    pullPolicy: IfNotPresent

  env:
    apiUrl: "https://quiz.example.com/api"

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 250m
      memory: 128Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

postgresql:
  # For production, consider using a managed database service
  # Set enabled: false and provide external DATABASE_URL in backend.secrets
  enabled: true

  auth:
    username: quizapp
    # Use external secret management
    # Provide this at deploy time (e.g. --set postgresql.auth.existingSecret=my-secret)
    existingSecret: ""
    database: quizdb

  primary:
    persistence:
      enabled: true
      size: 20Gi
      # storageClass: "fast-ssd"

    resources:
      limits:
        cpu: 2000m
        memory: 1Gi
      requests:
        cpu: 1000m
        memory: 512Mi

    # Enable backup
    extendedConfiguration: |
      max_connections = 200
      shared_buffers = 256MB
      effective_cache_size = 1GB
      maintenance_work_mem = 128MB
      checkpoint_completion_target = 0.9
      wal_buffers = 16MB
      default_statistics_target = 100

  # Enable read replicas for scaling
  readReplicas:
    replicaCount: 2
    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 256Mi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

ingress:
  enabled: true
  className: "nginx"

  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # Enable CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://quiz.example.com"

  hosts:
    - host: quiz.example.com
      paths:
        - path: /api
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /socket.io
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /
          pathType: Prefix
          service:
            name: frontend
            port: 80

  tls:
    - secretName: quiz-app-prod-tls
      hosts:
        - quiz.example.com

otelCollector:
  enabled: true

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 200m
      memory: 128Mi

monitoring:
  enabled: true

  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

  prometheusRule:
    enabled: true
    labels:
      prometheus: kube-prometheus
    rules:
      - alert: QuizAppBackendDown
        expr: up{job="quiz-app-backend"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "QuizApp Backend is down"
          description: "Backend has been down for more than 5 minutes"

      - alert: QuizAppHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for 5 minutes"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
  egress:
    - to:
        - namespaceSelector: {}
