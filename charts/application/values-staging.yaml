---
# Staging environment values for QuizMaster
# Usage: helm install quiz-app ./deploy/helm/quiz-app \
#   -f ./deploy/helm/quiz-app/values-staging.yaml

backend:
  replicaCount: 2

  image:
    tag: "staging"
    pullPolicy: IfNotPresent

  env:
    nodeEnv: production
    corsOrigin: "https://quiz-staging.example.com"

  resources:
    limits:
      cpu: 750m
      memory: 384Mi
    requests:
      cpu: 250m
      memory: 192Mi

  secrets:
    # Override these in a separate sealed-secrets or external secrets operator
    jwtSecret: "CHANGE_ME"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

frontend:
  replicaCount: 2

  image:
    tag: "staging"
    pullPolicy: IfNotPresent

  env:
    apiUrl: "https://quiz-staging.example.com/api"

  resources:
    limits:
      cpu: 400m
      memory: 192Mi
    requests:
      cpu: 150m
      memory: 96Mi

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

postgresql:
  enabled: true

  auth:
    username: quizapp
    # Use existing secret for password
    # Provide this at deploy time (e.g. --set postgresql.auth.existingSecret=my-secret)
    existingSecret: ""
    database: quizdb

  primary:
    persistence:
      enabled: true
      size: 5Gi

    resources:
      limits:
        cpu: 750m
        memory: 384Mi
      requests:
        cpu: 250m
        memory: 192Mi

ingress:
  enabled: true
  className: "nginx"

  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"

  hosts:
    - host: quiz-staging.example.com
      paths:
        - path: /api
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /socket.io
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /
          pathType: Prefix
          service:
            name: frontend
            port: 80

  tls:
    - secretName: quiz-app-staging-tls
      hosts:
        - quiz-staging.example.com

otelCollector:
  enabled: true

monitoring:
  enabled: true

  serviceMonitor:
    enabled: true
