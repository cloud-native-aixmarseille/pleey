---
# Default values for Pleey
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Global configuration
global:
  # Default image registry settings
  imageRegistry: ""
  imagePullPolicy: Always
  imagePullSecrets: []
  # Gloabl storageClass used for persistent volumes
  storageClass: ""

  # TODO: remove this config
  initContainers:
    waitForDb:
      image:
        registry: ""
        repository: busybox
        tag: "1.36"
        # Replace with the real digest for your registry/image.
        digest: "sha256:00baf5736376036ea4bc1a1c075784fc98a79186604d5d41305cd9b428b3b737"

backend:
  enabled: true

frontend:
  enabled: true

  env:
    # API URL - will be injected into the frontend build
    apiUrl: "http://backend:3001"

## PostgreSQL database configuration
# Using Bitnami PostgreSQL chart
postgresql:
  enabled: true

  image:
    repository: bitnamilegacy/postgresql
    pullPolicy: Always
    # Replace with the real digest for your registry/image.
    digest: "sha256:94c148526e3de5a414cc53f75701ed0d57ff3719466851723512fcbd1182522a"

  # PostgreSQL authentication
  auth:
    username: pleeyapp
    password: pleeyapp_password
    database: pleeydb
    # Use existing secret (recommended for production)
    existingSecret: ""
    # Prefer using secret volumes (files) over env vars
    usePasswordFiles: true

  # Metrics exporter for Prometheus
  metrics:
    enabled: false
    image:
      repository: bitnamilegacy/postgres-exporter
    serviceMonitor:
      enabled: false

  volumePermissions:
    image:
      repository: bitnamilegacy/os-shell

## Valkey (Redis-compatible) configuration
valkey:
  enabled: true
