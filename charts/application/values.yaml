---
# global configures values shared with every local subchart.
global:
  applicationName: pleey-app
  fullnameOverride: ""
  imageRegistry: ""
  imagePullPolicy: Always
  imagePullSecrets: []
  storageClass: ""

# backend configures the backend local subchart and its runtime dependencies.
backend:
  enabled: true

# frontend configures the frontend local subchart.
frontend:
  enabled: true

# gateway configures how users reach the frontend and backend API.
gateway:
  provider: ingress
  ingress:
    className: ""
    annotations: {}
    host: pleey.localhost
    tls: []
    pathType: Prefix
    frontendPath: /
    graphqlPath: /graphql
    apiPath: /api
    socketPath: /socket.io

# networkPolicy configures the baseline release NetworkPolicy and optional extra rules.
networkPolicy:
  enabled: true
  ingress: []
  egress: []

# podDisruptionBudget optionally creates disruption budgets for replicated workloads.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# tests configures optional Helm-native smoke tests for frontend and backend services.
tests:
  enabled: true
  image:
    registry: docker.io
    repository: busybox
    tag: "1.37.0"
    digest: sha256:b8d1827e38a1d49cd17217efd7b07d689e4ea1744e39c7dcbb95533d175bea65
    pullPolicy: ""
  resources:
    limits:
      cpu: 50m
      memory: 32Mi
    requests:
      cpu: 10m
      memory: 16Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  livenessProbe:
    exec:
      command:
        - sh
        - -ec
        - ps -o pid= 1 >/dev/null
    initialDelaySeconds: 1
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    exec:
      command:
        - sh
        - -ec
        - ps -o pid= 1 >/dev/null
    initialDelaySeconds: 1
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
