# Docker Compose V2 - Development Configuration
# Optimized with BuildKit cache mounts and multi-stage builds

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quiz-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-quizapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quizapp_password}
      - POSTGRES_DB=${POSTGRES_DB:-quizdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quiz-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-quizapp} -d ${POSTGRES_DB:-quizdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # Backend NestJS (dev watch mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
      cache_from:
        - type=registry,ref=ghcr.io/quiz-app/backend:cache
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: quiz-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-votre_secret_jwt_super_securise_changez_moi}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-quizapp}:${POSTGRES_PASSWORD:-quizapp_password}@postgres:5432/${POSTGRES_DB:-quizdb}?schema=public
      - CORS_ORIGIN=*
      - CHOKIDAR_USEPOLLING=1
      - CHOKIDAR_INTERVAL=500
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      otel-collector:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - quiz-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/health/live', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React (Vite dev server with watch)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
      cache_from:
        - type=registry,ref=ghcr.io/quiz-app/frontend:cache
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: quiz-frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - quiz-network
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:3001
      - CHOKIDAR_USEPOLLING=1

  otel-collector:
    image: otel/opentelemetry-collector:0.105.0
    restart: unless-stopped
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol/config.yaml
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD", "/otelcol", "validate", "--config=/etc/otelcol/config.yaml"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  quiz-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  backend-node-modules:
    driver: local
  frontend-node-modules:
    driver: local
