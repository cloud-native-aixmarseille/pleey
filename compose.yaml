# Docker Compose V2 - Development Configuration
# Optimized with BuildKit cache mounts and multi-stage builds
# Using Traefik for reverse proxy to avoid port collisions

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quiz-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-quizapp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-quizapp_password}
      - POSTGRES_DB=${POSTGRES_DB:-quizdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quiz-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-quizapp} -d ${POSTGRES_DB:-quizdb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    # No port binding - use docker exec or expose via Traefik if needed
    # For database tools, you can still use: docker exec -it quiz-postgres psql

  # Backend NestJS (dev watch mode)
  backend:
    build:
      dockerfile: application/backend/Dockerfile
      target: dev
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}" # Run as host user to avoid permission issues
    volumes:
      - ./application/backend:/usr/src/app
    expose:
      - "3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-votre_secret_jwt_super_securise_changez_moi}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-quizapp}:${POSTGRES_PASSWORD:-quizapp_password}@postgres:5432/${POSTGRES_DB:-quizdb}?schema=public
      - CORS_ORIGIN=*
      - CHOKIDAR_USEPOLLING=1
      - CHOKIDAR_INTERVAL=500
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
    depends_on:
      otel-collector:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - quiz-network
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`quiz-app.localhost`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.backend.entrypoints=http"
      - "traefik.http.routers.backend.priority=100"
      - "traefik.http.services.backend.loadbalancer.server.port=3001"
      - "traefik.docker.network=traefik-proxy"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/api/health/live', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React (Vite dev server with watch)
  frontend:
    build:
      dockerfile: ./application/frontend/Dockerfile
      target: dev
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}" # Run as host user to avoid permission issues
    volumes:
      - ./application/frontend:/usr/src/app
    expose:
      - "5173"
    depends_on:
      - backend
    networks:
      - quiz-network
      - traefik-proxy
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=1
      - VITE_DEV_PROXY_TARGET=http://backend:3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`quiz-app.localhost`) && !PathPrefix(`/api`) && !PathPrefix(`/socket.io`)"
      - "traefik.http.routers.frontend.entrypoints=http"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
      - "traefik.docker.network=traefik-proxy"

  e2e-tests:
    image: mcr.microsoft.com/playwright:v1.56.1-jammy
    working_dir: /workspace
    init: true
    stdin_open: true
    tty: true
    expose:
      - "9323"
    environment:
      - BASE_URL=${BASE_URL:-http://frontend:5173}
      - API_BASE_URL=${API_BASE_URL:-http://backend:3001/api}
      - E2E_ADMIN_EMAIL=${E2E_ADMIN_EMAIL:-admin@quiz.com}
      - E2E_ADMIN_PASSWORD=${E2E_ADMIN_PASSWORD:-admin123}
      - E2E_PLAYER_EMAIL=${E2E_PLAYER_EMAIL:-player@quiz.com}
      - E2E_PLAYER_PASSWORD=${E2E_PLAYER_PASSWORD:-player123}
    volumes:
      - ./e2e:/workspace
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - quiz-network
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.e2e-tests.rule=Host(`e2e.quiz-app.localhost`)"
      - "traefik.http.routers.e2e-tests.entrypoints=http"
      - "traefik.http.services.e2e-tests.loadbalancer.server.port=9323"
      - "traefik.docker.network=traefik-proxy"

  otel-collector:
    image: otel/opentelemetry-collector:0.105.0
    restart: unless-stopped
    volumes:
      - ./docker/otel-collector/config.yaml:/etc/otelcol/config.yaml
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD", "/otelcol", "validate", "--config=/etc/otelcol/config.yaml"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  quiz-network:
    driver: bridge
  traefik-proxy:
    name: traefik-proxy
    external: true

volumes:
  postgres-data:
    driver: local
