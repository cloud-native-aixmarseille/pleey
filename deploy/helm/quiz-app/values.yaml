# Default values for QuizMaster
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Global configuration
global:
  # Default image registry
  imageRegistry: ""
  # Default image pull policy
  imagePullPolicy: IfNotPresent
  # Pull secrets for private registries
  imagePullSecrets: []
  # Storage class for persistent volumes
  storageClass: ""

## Backend NestJS configuration
backend:
  enabled: true
  
  # Number of replicas
  replicaCount: 2
  
  image:
    registry: ghcr.io
    repository: cloud-native-aixmarseille/quiz-app/backend
    tag: "latest"
    pullPolicy: IfNotPresent
  
  # Service configuration
  service:
    type: ClusterIP
    port: 3001
    targetPort: 3001
    annotations: {}
  
  # Application environment variables
  env:
    nodeEnv: production
    port: 3001
    corsOrigin: "*"
    # OTEL configuration
    otelExporterOtlpEndpoint: "http://otel-collector:4318"
  
  # Secrets - these should be overridden in production
  secrets:
    # JWT secret for authentication
    jwtSecret: "change-me-in-production-use-strong-random-secret"
    # Database connection (if not using postgresql subchart)
    databaseUrl: ""
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 1000m
      memory: 512Mi
    requests:
      cpu: 500m
      memory: 256Mi
  
  # Health checks
  livenessProbe:
    httpGet:
      path: /api/health/live
      port: 3001
    initialDelaySeconds: 40
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
  
  readinessProbe:
    httpGet:
      path: /api/health/ready
      port: 3001
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  # Pod annotations
  podAnnotations: {}
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  
  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity rules
  affinity: {}
  
  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

## Frontend React/Nginx configuration
frontend:
  enabled: true
  
  # Number of replicas
  replicaCount: 2
  
  image:
    registry: ghcr.io
    repository: cloud-native-aixmarseille/quiz-app/frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  
  # Service configuration
  service:
    type: ClusterIP
    port: 80
    targetPort: 80
    annotations: {}
  
  # Application environment variables
  env:
    # API URL - will be injected into the frontend build
    apiUrl: "http://backend:3001"
  
  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 250m
      memory: 128Mi
  
  # Health checks
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 10
  
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
  
  # Pod annotations
  podAnnotations: {}
  
  # Pod security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
  
  # Container security context
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  
  # Node selector
  nodeSelector: {}
  
  # Tolerations
  tolerations: []
  
  # Affinity rules
  affinity: {}
  
  # Autoscaling
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

## PostgreSQL database configuration
# Using Bitnami PostgreSQL chart
postgresql:
  enabled: true
  
  # PostgreSQL authentication
  auth:
    username: quizapp
    password: quizapp_password
    database: quizdb
    # Use existing secret (recommended for production)
    existingSecret: ""
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  
  # Primary configuration
  primary:
    persistence:
      enabled: true
      size: 8Gi
      # storageClass: ""
    
    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 500m
        memory: 256Mi
    
    # PostgreSQL configuration
    extendedConfiguration: |
      max_connections = 100
      shared_buffers = 128MB
  
  # Read replicas (optional)
  readReplicas:
    replicaCount: 0
  
  # Metrics exporter for Prometheus
  metrics:
    enabled: false
    serviceMonitor:
      enabled: false

## Ingress configuration
ingress:
  enabled: true
  
  # Ingress class name
  className: "nginx"
  
  # Annotations for ingress controller
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # WebSocket support for backend
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  
  # Hosts configuration
  hosts:
    - host: quiz.example.com
      paths:
        - path: /api
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /socket.io
          pathType: Prefix
          service:
            name: backend
            port: 3001
        - path: /
          pathType: Prefix
          service:
            name: frontend
            port: 80
  
  # TLS configuration
  tls:
    - secretName: quiz-app-tls
      hosts:
        - quiz.example.com

## OpenTelemetry Collector (optional)
otelCollector:
  enabled: false
  
  image:
    registry: docker.io
    repository: otel/opentelemetry-collector
    tag: "0.105.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 4318
  
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

## Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

## Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

## Network Policy
networkPolicy:
  enabled: false
  # Ingress rules
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
  # Egress rules
  egress:
    - to:
      - namespaceSelector: {}

## Monitoring with Prometheus
monitoring:
  enabled: false
  
  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
  
  # PrometheusRule for alerts
  prometheusRule:
    enabled: false
    labels: {}
    rules: []

## Grafana dashboards
grafana:
  enabled: false
  # ConfigMap with dashboards
  dashboards: {}
