services:
  # Backend Node.js - Configuration Production
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend-prod
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - quiz-data:/app/data
      - backend-logs:/app/logs
    networks:
      - quiz-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend React avec Nginx - Configuration Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: quiz-frontend-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - quiz-network
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro # Certificats SSL
      - frontend-logs:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Watchtower - Auto-update des conteneurs
  watchtower:
    image: containrrr/watchtower
    container_name: quiz-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400 # Vérifier toutes les 24h
      - WATCHTOWER_INCLUDE_STOPPED=true
    networks:
      - quiz-network

networks:
  quiz-network:
    driver: bridge

volumes:
  quiz-data:
    driver: local
  backend-logs:
    driver: local
  frontend-logs:
    driver: local
